name: chromatintrek
channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  # ── Python ───────────────────────────────────────────────────────────────
  - python=3.11
  - pip

  # ── Core bioinformatics tools ────────────────────────────────────────────
  - fastqc=0.12.1
  - trim-galore=0.6.10
  - bowtie2=2.5.3
  - samtools=1.19.2
  - picard=3.1.1
  - bedtools=2.31.1
  - macs3=3.0.1
  - homer=4.11
  - deeptools=3.5.4
  - multiqc=1.20
  - ucsc-bedclip
  - ucsc-bedgraphtobigwig
  - ucsc-fetchchromsizes

  # ── Python scientific stack ───────────────────────────────────────────────
  - numpy>=1.26
  - scipy>=1.12
  - pandas>=2.2
  - matplotlib>=3.8
  - seaborn>=0.13
  - lxml
  - requests
  - pyyaml>=6.0
  - tqdm
  - joblib

  # ── Snakemake ─────────────────────────────────────────────────────────────
  - snakemake-minimal>=8.0

  # ── pip-only packages ────────────────────────────────────────────────────
  - pip:
      - pybedtools>=0.10.0
      - pyranges>=0.0.129
      - gseapy>=1.1.3
      - logomaker>=0.8
      - snakemake-executor-plugin-slurm>=0.4.0
      - cookiecutter
      - chromatintrek       # Install package itself in editable mode via: pip install -e .
